name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when a newer commit is pushed to the same PR / branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Force IPv4 DNS resolution. On Linux runners the default order returns IPv6 first
# and Node's fetch hits a happy-eyeballs delay (~3–4s per call) when the test mock
# server is bound to IPv4 only — pushing the slower tests over Vitest's 5s timeout.
env:
  NODE_OPTIONS: '--dns-result-order=ipv4first'

jobs:
  test:
    name: build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

  cross-os:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
