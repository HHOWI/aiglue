tools_yaml_version: "1.0"
tools:
  - name: get_alarm_list
    description: "알람 목록을 조회한다. 장비 통신 문제와 센서 동작 문제 두 종류가 있다."
    endpoint: POST /api/v0/alarm/list
    params:
      status:
        description: "알람 처리 상태 (미확인/확인/조치완료)"
        enum: [UNCHECKED, CHECKED, RESOLVED]
        required: false
    request_body_template:
      pageNo: 1
      pageSize: 50
    response_mapping:
      data_path: "contents.list"
      total_path: "contents.totalCount"
    columns:
      - { key: "alarmId", label: "ID" }
      - { key: "alarmType", label: "유형", type: "badge" }
      - { key: "status", label: "상태" }
    response_type: table
    risk_level: read
    examples:
      - "미확인 알람 보여줘"
      - "알람 목록"

  - name: get_alarm_counts
    description: "알람 상태별 건수를 조회한다."
    endpoint: POST /api/v0/alarm/counts
    response_type: text
    risk_level: read
    examples:
      - "알람 몇 건이야?"

  - name: get_dashboard
    description: "전체 현장의 종합 대시보드 데이터를 조회한다."
    endpoint: POST /api/v0/dashboard/dashboard-data
    response_type: text
    risk_level: read
    examples:
      - "전체 현황 요약해줘"
      - "대시보드 보여줘"

  - name: get_thickness_trend
    description: "센서의 두께 변화 추이를 시계열로 조회한다."
    endpoint: POST /api/v0/sensor/thickness-trend
    params:
      sensorId:
        description: "센서 ID"
        type: string
        required: true
    response_type: text
    risk_level: read
    examples:
      - "MC-003 두께 트렌드 보여줘"

  - name: update_alarm_status
    description: "알람의 처리 상태를 변경한다 (미확인→확인→조치완료)."
    endpoint: POST /api/v0/alarm/update
    risk_level: write
    confirm_message: "알람 상태를 변경합니다. 진행할까요?"
